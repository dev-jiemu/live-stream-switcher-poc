services:

  # ── Redis Cluster 노드 (3 마스터 + 3 레플리카) ──────────────────────────────
  redis-1:
    image: redis:7-alpine
    container_name: redis-1
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-1.conf:/usr/local/etc/redis/redis.conf
      - redis-1-data:/data
    ports:
      - "7001:7001"
      - "17001:17001"
    networks:
      redis-cluster-net:
        ipv4_address: 172.28.0.11

  redis-2:
    image: redis:7-alpine
    container_name: redis-2
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-2.conf:/usr/local/etc/redis/redis.conf
      - redis-2-data:/data
    ports:
      - "7002:7002"
      - "17002:17002"
    networks:
      redis-cluster-net:
        ipv4_address: 172.28.0.12

  redis-3:
    image: redis:7-alpine
    container_name: redis-3
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-3.conf:/usr/local/etc/redis/redis.conf
      - redis-3-data:/data
    ports:
      - "7003:7003"
      - "17003:17003"
    networks:
      redis-cluster-net:
        ipv4_address: 172.28.0.13

  redis-4:
    image: redis:7-alpine
    container_name: redis-4
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-4.conf:/usr/local/etc/redis/redis.conf
      - redis-4-data:/data
    ports:
      - "7004:7004"
      - "17004:17004"
    networks:
      redis-cluster-net:
        ipv4_address: 172.28.0.14

  redis-5:
    image: redis:7-alpine
    container_name: redis-5
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-5.conf:/usr/local/etc/redis/redis.conf
      - redis-5-data:/data
    ports:
      - "7005:7005"
      - "17005:17005"
    networks:
      redis-cluster-net:
        ipv4_address: 172.28.0.15

  redis-6:
    image: redis:7-alpine
    container_name: redis-6
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-6.conf:/usr/local/etc/redis/redis.conf
      - redis-6-data:/data
    ports:
      - "7006:7006"
      - "17006:17006"
    networks:
      redis-cluster-net:
        ipv4_address: 172.28.0.16

  # ── 클러스터 초기화 (최초 1회만 실행) ───────────────────────────────────────
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-1
      - redis-2
      - redis-3
      - redis-4
      - redis-5
      - redis-6
    networks:
      - redis-cluster-net
    entrypoint: ["/bin/sh", "-c", "sleep 3 && redis-cli --cluster create 172.28.0.11:7001 172.28.0.12:7002 172.28.0.13:7003 172.28.0.14:7004 172.28.0.15:7005 172.28.0.16:7006 --cluster-replicas 1 --cluster-yes"]
    restart: on-failure

volumes:
  redis-1-data:
  redis-2-data:
  redis-3-data:
  redis-4-data:
  redis-5-data:
  redis-6-data:

networks:
  redis-cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
